name: Build

on:
  push:
    branches:
      - master
      - feat/socket-publisher
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # needed to create releases

jobs:
  build:
    name: Build (${{ matrix.platform_tag }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform_tag: macos-arm64
            lib_ext: dylib
          - os: ubuntu-22.04
            platform_tag: linux-x86_64
            lib_ext: so

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ----- Pin CMake 3.22 to match what ORB-SLAM3 was developed against -----
      # Newer cmake (4.x) removes support for cmake_minimum_required < 3.5
      # which breaks ORB-SLAM3's bundled Thirdparty (DBoW2 2.8, g2o 2.6).
      # Rather than patch every legacy CMakeLists.txt, we pin to 3.22.6
      # which is modern enough to handle our workflow but still supports
      # the legacy VERSION declarations.
      - name: Install CMake 3.22.6
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.22.6'

      # ----- Dependencies -----
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          # libomp: AppleClang doesn't ship OpenMP by default, g2o needs it
          brew install opencv boost openssl@3 glew libomp
          # Eigen: brew now ships Eigen 5.x but g2o uses find_package(Eigen3 3.1.0)
          # which Eigen 5's cmake config rejects. Install Eigen 3.4.0 from source
          # into a local prefix that we point cmake at.
          EIGEN_INSTALL_DIR="$RUNNER_TEMP/eigen-3.4.0"
          git clone --depth 1 --branch 3.4.0 https://gitlab.com/libeigen/eigen.git /tmp/eigen-src
          cmake -S /tmp/eigen-src -B /tmp/eigen-src/build \
            -DCMAKE_INSTALL_PREFIX="$EIGEN_INSTALL_DIR" \
            -DBUILD_TESTING=OFF
          cmake --build /tmp/eigen-src/build --target install
          echo "EIGEN3_ROOT=$EIGEN_INSTALL_DIR" >> $GITHUB_ENV
          echo "Eigen3_DIR=$EIGEN_INSTALL_DIR/share/eigen3/cmake" >> $GITHUB_ENV
          # libomp paths for AppleClang OpenMP
          LIBOMP_PREFIX="$(brew --prefix libomp)"
          echo "OpenMP_C_FLAGS=-Xpreprocessor -fopenmp -I$LIBOMP_PREFIX/include" >> $GITHUB_ENV
          echo "OpenMP_C_LIB_NAMES=omp" >> $GITHUB_ENV
          echo "OpenMP_CXX_FLAGS=-Xpreprocessor -fopenmp -I$LIBOMP_PREFIX/include" >> $GITHUB_ENV
          echo "OpenMP_CXX_LIB_NAMES=omp" >> $GITHUB_ENV
          echo "OpenMP_omp_LIBRARY=$LIBOMP_PREFIX/lib/libomp.dylib" >> $GITHUB_ENV

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git pkg-config \
            libopencv-dev libeigen3-dev libboost-all-dev libssl-dev \
            libgl1-mesa-dev libglew-dev libwayland-dev libxkbcommon-dev \
            wayland-protocols libegl1-mesa-dev libepoxy-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            python3

      # ----- Thirdparty: DBoW2 -----
      - name: Build DBoW2
        run: |
          cd Thirdparty/DBoW2
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . -- -j$(getconf _NPROCESSORS_ONLN)

      # ----- Thirdparty: g2o -----
      - name: Build g2o
        run: |
          cd Thirdparty/g2o
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . -- -j$(getconf _NPROCESSORS_ONLN)

      # ----- Thirdparty: Sophus -----
      - name: Build Sophus
        run: |
          cd Thirdparty/Sophus
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . -- -j$(getconf _NPROCESSORS_ONLN)

      # ----- Thirdparty: Pangolin (clone + build from source) -----
      # We run headless via SocketPublisher, so we disable all video drivers
      # (ffmpeg, libav, etc.) which break on modern ffmpeg 5+ due to removed
      # avcodec_close() and other API changes in Pangolin 0.9.1.
      # Core pango_display + pango_windowing + pango_opengl are kept because
      # ORB-SLAM3's libORB_SLAM3 links against them even when the viewer is
      # disabled at runtime.
      - name: Build Pangolin
        run: |
          if [ ! -d Thirdparty/Pangolin ]; then
            git clone --recursive --depth 1 --branch v0.9.1 \
              https://github.com/stevenlovegrove/Pangolin.git Thirdparty/Pangolin
          fi
          cd Thirdparty/Pangolin
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_PANGOLIN_PYTHON=OFF \
            -DBUILD_PANGOLIN_VIDEO=OFF \
            -DBUILD_PANGOLIN_FFMPEG=OFF \
            -DBUILD_PANGOLIN_LIBREALSENSE=OFF \
            -DBUILD_PANGOLIN_LIBREALSENSE2=OFF \
            -DBUILD_PANGOLIN_LIBDC1394=OFF \
            -DBUILD_PANGOLIN_LIBUVC=OFF \
            -DBUILD_PANGOLIN_LIBJPEG_TURBO=OFF \
            -DBUILD_PANGOLIN_TOON=OFF \
            -DBUILD_PANGOLIN_ZSTD=OFF \
            -DBUILD_PANGOLIN_LZ4=OFF
          cmake --build build -- -j$(getconf _NPROCESSORS_ONLN)

      # ----- Vocabulary -----
      - name: Uncompress vocabulary
        run: |
          if [ ! -f Vocabulary/ORBvoc.txt ]; then
            cd Vocabulary && tar -xf ORBvoc.txt.tar.gz
          fi

      # ----- ORB_SLAM3 -----
      - name: Configure ORB_SLAM3
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build ORB_SLAM3
        run: cmake --build build -- -j$(getconf _NPROCESSORS_ONLN)

      # ----- Bundle dependent libs (macOS) -----
      # The built mono_tum + libORB_SLAM3.dylib reference absolute paths like
      # /opt/homebrew/opt/opencv/lib/libopencv_*.dylib which don't exist on
      # user machines. We copy only the direct Homebrew dependencies and
      # rewrite install names with install_name_tool.
      #
      # Note: we tried dylibbundler first but it recurses the full dylib
      # tree, and Homebrew's opencv pulls in gstreamer/ffmpeg/qt/tesseract
      # (hundreds of libs, 20+ minutes to process). This manual approach
      # limits scope to what mono_tum actually needs at the first level
      # and one level of transitive (opencv→libavcodec etc).
      - name: Bundle dylibs (macOS)
        if: runner.os == 'macOS'
        run: |
          set -e
          mkdir -p staging/bin staging/libs
          cp Examples/Monocular/mono_tum staging/bin/
          cp lib/libORB_SLAM3.dylib staging/libs/
          cp Thirdparty/DBoW2/lib/libDBoW2.dylib staging/libs/
          cp Thirdparty/g2o/lib/libg2o.dylib staging/libs/
          # All Pangolin build outputs (not just libpango_* — also libtinyobj,
          # libpango_python, etc. which are referenced via @rpath/)
          cp Thirdparty/Pangolin/build/*.dylib staging/libs/ 2>/dev/null || true

          # Helper: identify "non-system" dependencies. We relocate anything
          # that's NOT in /usr/lib, /System, or @rpath (already relative).
          # This catches both /opt/homebrew/* (brew deps) AND /Users/runner/*
          # (ORB-SLAM3's own build-tree install_names on libORB_SLAM3.dylib).
          list_nonsys_deps() {
            otool -L "$1" 2>/dev/null | tail -n +2 | awk '{print $1}' | \
              grep -vE '^/usr/lib/|^/System/|^@' || true
          }

          # Helper: copy a non-system dependency into libs/ if we can find it
          # on disk.
          copy_nonsys_deps() {
            local target="$1"
            list_nonsys_deps "$target" | while read -r dep; do
              [ -z "$dep" ] && continue
              local name=$(basename "$dep")
              if [ ! -f "staging/libs/$name" ] && [ -f "$dep" ]; then
                cp "$dep" staging/libs/
                chmod u+w "staging/libs/$name"
              fi
            done
          }

          # Three passes to catch opencv's internal dependency chains.
          for pass in 1 2 3; do
            for f in staging/bin/mono_tum staging/libs/*.dylib; do
              copy_nonsys_deps "$f"
            done
          done

          echo "Copied $(ls staging/libs/ | wc -l) libs"
          ls staging/libs/ | head -30

          # Rewrite install names: @loader_path-relative for all binaries.
          # mono_tum lives at Examples/Monocular/, libs/ at dist root,
          # so from bin → ../../libs/. For the libs themselves → ./
          rewrite_paths() {
            local target="$1"
            local rel_libs="$2"  # "../../libs" for mono_tum, "." for sibling libs
            list_nonsys_deps "$target" | while read -r dep; do
              [ -z "$dep" ] && continue
              local name=$(basename "$dep")
              install_name_tool -change "$dep" "@loader_path/$rel_libs/$name" "$target"
            done
            # Also fix self install_name for libs (so dyld cache matches)
            if [[ "$target" == *.dylib ]]; then
              local selfname=$(basename "$target")
              install_name_tool -id "@rpath/$selfname" "$target" 2>/dev/null || true
            fi
          }

          rewrite_paths staging/bin/mono_tum "../../libs"
          for f in staging/libs/*.dylib; do
            rewrite_paths "$f" "."
          done
          # mono_tum: rpath points to libs/ (for @rpath-prefixed deps)
          install_name_tool -add_rpath "@loader_path/../../libs" staging/bin/mono_tum 2>/dev/null || true
          # Each lib in libs/: add @loader_path as rpath so sibling @rpath/
          # references (e.g. libtinyobj → libpango_geometry) resolve.
          for f in staging/libs/*.dylib; do
            install_name_tool -add_rpath "@loader_path" "$f" 2>/dev/null || true
          done
          # Resign to avoid macOS Gatekeeper rejection after modification
          codesign --force --sign - staging/bin/mono_tum
          for f in staging/libs/*.dylib; do
            codesign --force --sign - "$f"
          done
          echo "Bundling done in $(date)"

      # ----- Bundle dependent libs (Linux) -----
      # patchelf adjusts RPATH on linux ELF binaries. Copy dependent shared
      # libs into lib/ and set RPATH to $ORIGIN/../lib.
      - name: Bundle shared libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y patchelf
          mkdir -p staging/lib staging/bin
          cp lib/libORB_SLAM3.so staging/lib/
          cp Thirdparty/DBoW2/lib/libDBoW2.so staging/lib/
          cp Thirdparty/g2o/lib/libg2o.so staging/lib/
          cp Examples/Monocular/mono_tum staging/bin/
          # Copy all non-system dylib dependencies from ldd output
          copy_deps() {
            local bin="$1"
            ldd "$bin" | awk '/=> \// {print $3}' | while read lib; do
              case "$lib" in
                /lib/*|/lib64/*|/usr/lib/*|/usr/lib64/*) ;;  # system libs, skip
                "") ;;
                *) cp -n "$lib" staging/lib/ 2>/dev/null || true ;;
              esac
            done
          }
          copy_deps staging/bin/mono_tum
          copy_deps staging/lib/libORB_SLAM3.so
          copy_deps staging/lib/libDBoW2.so
          copy_deps staging/lib/libg2o.so
          # Recursively process newly copied libs
          for lib in staging/lib/*.so*; do
            copy_deps "$lib"
          done
          # Set RPATH on all binaries
          patchelf --set-rpath '$ORIGIN/../lib' staging/bin/mono_tum
          for lib in staging/lib/*.so*; do
            patchelf --set-rpath '$ORIGIN' "$lib" 2>/dev/null || true
          done
          ls -lh staging/lib/ | head -20
          echo "bundled lib count: $(ls staging/lib/ | wc -l)"

      # ----- Package -----
      - name: Package artifact
        run: |
          ARCHIVE="orb-slam3-spatial-${{ matrix.platform_tag }}.tar.gz"
          mkdir -p dist/Examples/Monocular dist/Vocabulary
          cp staging/bin/mono_tum dist/Examples/Monocular/
          cp Vocabulary/ORBvoc.txt dist/Vocabulary/
          cp Examples/Monocular/TUM1.yaml dist/Examples/Monocular/
          cp Examples/Monocular/TUM2.yaml dist/Examples/Monocular/
          cp Examples/Monocular/TUM3.yaml dist/Examples/Monocular/
          cp Examples/Monocular/TUM1_tuned.yaml dist/Examples/Monocular/
          cp Examples/Monocular/Generic720.yaml dist/Examples/Monocular/
          # Bundled libs live at dist root:
          #   macOS: dist/libs/*.dylib  (@loader_path/../../libs from mono_tum)
          #   Linux: dist/lib/*.so*      ($ORIGIN/../lib from mono_tum)
          if [ "$RUNNER_OS" = "macOS" ]; then
            mkdir -p dist/libs
            cp staging/libs/*.dylib dist/libs/
          else
            mkdir -p dist/lib
            cp staging/lib/*.so* dist/lib/
          fi
          tar czf "$ARCHIVE" -C dist .
          ls -lh "$ARCHIVE"
          echo "--- archive contents summary ---"
          tar tzf "$ARCHIVE" | head -30

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: orb-slam3-spatial-${{ matrix.platform_tag }}
          path: orb-slam3-spatial-${{ matrix.platform_tag }}.tar.gz
          retention-days: 30

  # ----- Release: triggered only on version tag push -----
  # When you push a tag like `v1.0.0`, this job downloads all platform
  # artifacts from the matrix build and publishes them as a GitHub Release.
  # visionmem/scripts/setup.sh downloads from releases/latest/download/*.
  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p release-files
          find artifacts -name '*.tar.gz' -exec cp {} release-files/ \;
          ls -lh release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
