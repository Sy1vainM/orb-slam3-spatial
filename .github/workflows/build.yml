name: Build

on:
  push:
    branches:
      - master
      - feat/socket-publisher
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.platform_tag }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform_tag: macos-arm64
            lib_ext: dylib
          - os: ubuntu-22.04
            platform_tag: linux-x86_64
            lib_ext: so

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ----- Pin CMake 3.22 to match what ORB-SLAM3 was developed against -----
      # Newer cmake (4.x) removes support for cmake_minimum_required < 3.5
      # which breaks ORB-SLAM3's bundled Thirdparty (DBoW2 2.8, g2o 2.6).
      # Rather than patch every legacy CMakeLists.txt, we pin to 3.22.6
      # which is modern enough to handle our workflow but still supports
      # the legacy VERSION declarations.
      - name: Install CMake 3.22.6
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.22.6'

      # ----- Dependencies -----
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          # libomp: AppleClang doesn't ship OpenMP by default, g2o needs it
          brew install opencv boost openssl@3 glew libomp
          # Eigen: brew now ships Eigen 5.x but g2o uses find_package(Eigen3 3.1.0)
          # which Eigen 5's cmake config rejects. Install Eigen 3.4.0 from source
          # into a local prefix that we point cmake at.
          EIGEN_INSTALL_DIR="$RUNNER_TEMP/eigen-3.4.0"
          git clone --depth 1 --branch 3.4.0 https://gitlab.com/libeigen/eigen.git /tmp/eigen-src
          cmake -S /tmp/eigen-src -B /tmp/eigen-src/build \
            -DCMAKE_INSTALL_PREFIX="$EIGEN_INSTALL_DIR" \
            -DBUILD_TESTING=OFF
          cmake --build /tmp/eigen-src/build --target install
          echo "EIGEN3_ROOT=$EIGEN_INSTALL_DIR" >> $GITHUB_ENV
          echo "Eigen3_DIR=$EIGEN_INSTALL_DIR/share/eigen3/cmake" >> $GITHUB_ENV
          # libomp paths for AppleClang OpenMP
          LIBOMP_PREFIX="$(brew --prefix libomp)"
          echo "OpenMP_C_FLAGS=-Xpreprocessor -fopenmp -I$LIBOMP_PREFIX/include" >> $GITHUB_ENV
          echo "OpenMP_C_LIB_NAMES=omp" >> $GITHUB_ENV
          echo "OpenMP_CXX_FLAGS=-Xpreprocessor -fopenmp -I$LIBOMP_PREFIX/include" >> $GITHUB_ENV
          echo "OpenMP_CXX_LIB_NAMES=omp" >> $GITHUB_ENV
          echo "OpenMP_omp_LIBRARY=$LIBOMP_PREFIX/lib/libomp.dylib" >> $GITHUB_ENV

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git pkg-config \
            libopencv-dev libeigen3-dev libboost-all-dev libssl-dev \
            libgl1-mesa-dev libglew-dev libwayland-dev libxkbcommon-dev \
            wayland-protocols libegl1-mesa-dev libepoxy-dev \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            python3

      # ----- Thirdparty: DBoW2 -----
      - name: Build DBoW2
        run: |
          cd Thirdparty/DBoW2
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . -- -j$(getconf _NPROCESSORS_ONLN)

      # ----- Thirdparty: g2o -----
      - name: Build g2o
        run: |
          cd Thirdparty/g2o
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . -- -j$(getconf _NPROCESSORS_ONLN)

      # ----- Thirdparty: Sophus -----
      - name: Build Sophus
        run: |
          cd Thirdparty/Sophus
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . -- -j$(getconf _NPROCESSORS_ONLN)

      # ----- Thirdparty: Pangolin (clone + build from source) -----
      # We run headless via SocketPublisher, so we disable all video drivers
      # (ffmpeg, libav, etc.) which break on modern ffmpeg 5+ due to removed
      # avcodec_close() and other API changes in Pangolin 0.9.1.
      # Core pango_display + pango_windowing + pango_opengl are kept because
      # ORB-SLAM3's libORB_SLAM3 links against them even when the viewer is
      # disabled at runtime.
      - name: Build Pangolin
        run: |
          if [ ! -d Thirdparty/Pangolin ]; then
            git clone --recursive --depth 1 --branch v0.9.1 \
              https://github.com/stevenlovegrove/Pangolin.git Thirdparty/Pangolin
          fi
          cd Thirdparty/Pangolin
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_TESTS=OFF \
            -DBUILD_PANGOLIN_PYTHON=OFF \
            -DBUILD_PANGOLIN_VIDEO=OFF \
            -DBUILD_PANGOLIN_FFMPEG=OFF \
            -DBUILD_PANGOLIN_LIBREALSENSE=OFF \
            -DBUILD_PANGOLIN_LIBREALSENSE2=OFF \
            -DBUILD_PANGOLIN_LIBDC1394=OFF \
            -DBUILD_PANGOLIN_LIBUVC=OFF \
            -DBUILD_PANGOLIN_LIBJPEG_TURBO=OFF \
            -DBUILD_PANGOLIN_TOON=OFF \
            -DBUILD_PANGOLIN_ZSTD=OFF \
            -DBUILD_PANGOLIN_LZ4=OFF
          cmake --build build -- -j$(getconf _NPROCESSORS_ONLN)

      # ----- Vocabulary -----
      - name: Uncompress vocabulary
        run: |
          if [ ! -f Vocabulary/ORBvoc.txt ]; then
            cd Vocabulary && tar -xf ORBvoc.txt.tar.gz
          fi

      # ----- ORB_SLAM3 -----
      - name: Configure ORB_SLAM3
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build ORB_SLAM3
        run: cmake --build build -- -j$(getconf _NPROCESSORS_ONLN)

      # ----- Package -----
      - name: Package artifact
        run: |
          ARCHIVE="orb-slam3-spatial-${{ matrix.platform_tag }}.tar.gz"
          tar czf "$ARCHIVE" \
            lib/libORB_SLAM3.${{ matrix.lib_ext }} \
            Examples/Monocular/mono_tum \
            Vocabulary/ORBvoc.txt \
            Thirdparty/DBoW2/lib/libDBoW2.${{ matrix.lib_ext }} \
            Thirdparty/g2o/lib/libg2o.${{ matrix.lib_ext }} \
            Examples/Monocular/TUM1.yaml \
            Examples/Monocular/TUM2.yaml \
            Examples/Monocular/TUM3.yaml \
            Examples/Monocular/TUM1_tuned.yaml \
            Examples/Monocular/Generic720.yaml
          ls -lh "$ARCHIVE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: orb-slam3-spatial-${{ matrix.platform_tag }}
          path: orb-slam3-spatial-${{ matrix.platform_tag }}.tar.gz
          retention-days: 30
